{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход</title>
    <link rel="stylesheet" href="{% static 'users/css/signin.css' %}">
</head>
<body>
    <h1>Вход</h1>

    {% if error_message %}
        <p style="color:red">{{ error_message }}</p>
    {% endif %}
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Войти</button>
    </form>

    <p>
        Нет аккаунта?
        <a href="{% url 'users:signup' %}">Зарегистрироваться</a>
    </p>
</body>
</html>
